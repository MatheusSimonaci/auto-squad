    hook_style: "Pergunta genuína que o versículo responde diretamente"
    cta_style: "Pergunta específica ao versículo + tema do vídeo — NUNCA template fixo, NUNCA pedir share"
    duration_target: "20s exatos (4 segmentos × 5s)"
    hashtag_pillars:
