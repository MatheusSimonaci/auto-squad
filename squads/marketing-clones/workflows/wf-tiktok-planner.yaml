# ═══════════════════════════════════════════════════════════════════════════════
# WORKFLOW: TikTok Content Planner
# Version: 2.0.0
# Purpose: Busca atividades do ClickUp (grupo "roteiro") e produz conceito,
#          descrição com hashtags e roteiro de 4 segmentos × 5s (20s total)
#          com narração TTS + prompts de geração de vídeo por segmento
# ═══════════════════════════════════════════════════════════════════════════════

workflow-id: wf-tiktok-planner
name: TikTok Content Planner
version: 2.0.0
estimated-time: 15-25 minutes
complexity: medium

description: |
  Pipeline completo para planejar um vídeo TikTok de 20 segundos (4 segmentos × 5s)
  a partir de tarefas do ClickUp no grupo "roteiro".

  Cada segmento produz dois outputs:
    - narration_text: texto TTS + overlay (≤12 palavras, ~5s de fala natural)
    - video_prompt:   prompt de geração de vídeo AI para a camada visual (5s)

  Fluxo:
  [channel input]
    → Phase 0: Fetch ClickUp roteiro (node script)
    → Phase 1: Concept Planning PARALLEL (MrBeast + Gary Vee → merge)
    → Phase 2: Description + Hashtags (Pedro Sobral)
    → Phase 3: Script SEQUENTIAL (Russell Brunson Pass A → MrBeast Pass B)
    → Phase 4: Publish to ClickUp
    → [output/tiktok/{channel}/{task_slug}/]

inputs:
  required:
    - channel: "biblia-em-imagens | tiktok-shop | informante-ai"
  optional:
    - description_agent: "pedro-sobral (default) | tiago-finch"
    - task_slug_override: "force a specific task slug (skips ClickUp fetch)"

