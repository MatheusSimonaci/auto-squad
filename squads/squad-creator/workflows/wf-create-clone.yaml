# OUTPUT ARTIFACTS
# ═══════════════════════════════════════════════════════════════════════════════
outputs:
  primary:
    - "squads/{squad_destination}/{slug}-agent.md — arquivo do clone aprovado (único artefato no topo do squad)"
    - "squads/{squad_destination}/.clones/{slug}/calibration-report.md — relatório de calibração"
  clone_workspace:
    # Tudo relacionado à construção do clone vive em squads/{squad_destination}/.clones/{slug}/
    # Isso mantém o topo do squad limpo (só agentes) e isola por clone.
    - "squads/{squad_destination}/.clones/{slug}/research-plan.yaml — plano de extração (Opus, PHASE-2)"
    - "squads/{squad_destination}/.clones/{slug}/raw-sources/*.txt — texto bruto extraído (Haiku, PHASE-3)"
    - "squads/{squad_destination}/.clones/{slug}/source-manifest.yaml — inventário de fontes extraídas (Haiku, PHASE-3)"
    - "squads/{squad_destination}/.clones/{slug}/prehd.md — PREHD completo com fontes"
    - "squads/{squad_destination}/.clones/{slug}/frameworks.md — 3 camadas de frameworks"
    - "squads/{squad_destination}/.clones/{slug}/response-dna.md — PENSAR-SENTIR-RESPONDER"

