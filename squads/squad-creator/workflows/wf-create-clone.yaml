# QUALITY CHECKLIST
# ═══════════════════════════════════════════════════════════════════════════════
quality_checklist:
  Phase 0 - Material Discovery:
    - "[ ] Pergunta sobre pasta local feita"
    - "[ ] Pergunta sobre URLs YouTube feita"
    - "[ ] Materiais catalogados (ou confirmado vazio)"

  Phase 1 - Inputs:
    - "[ ] Nome, domínio e squad de destino coletados"
    - "[ ] Squad de destino existe"
    - "[ ] Fontes primárias identificadas (ou pesquisa autorizada)"
    - "[ ] Clone não existe ainda no squad destino"

  Phase 2 - Research Plan:
    - "[ ] squads/{squad_destination}/.clones/{slug}/research-plan.yaml gerado"
    - "[ ] ≥3 tipos de fonte distintos planejados"
    - "[ ] ≥5 alvos YouTube com prioridade correta (entrevistas primeiro)"
    - "[ ] Todos os componentes PREHD/DNA têm fonte mapeada"

  Phase 3 - Source Extraction:
    - "[ ] squads/{squad_destination}/.clones/{slug}/source-manifest.yaml gerado"
    - "[ ] Materiais locais processados primeiro"
    - "[ ] YouTube processado em ordem de prioridade"
    - "[ ] Falhas documentadas no manifesto"

  Phase 4 - DNA Synthesis:
    - "[ ] 5 componentes PREHD documentados com citação de arquivo fonte"
    - "[ ] ≥7 termos no vocabulário com exemplos reais"
    - "[ ] Protocolo forense 5 passos aplicado"
    - "[ ] ≥3 frameworks Camada 1 (trigger+processo+output+fonte)"
    - "[ ] ≥3 entradas Camada 2 (tabela situacional)"
    - "[ ] ≥2 meta-frameworks Camada 3 com fontes"
    - "[ ] Tipo cognitivo identificado com evidência"
    - "[ ] ≥3 gatilhos emocionais documentados"
    - "[ ] Modulação contextual (3 perfis) definida"
    - "[ ] Fórmula signature validada com 3 perguntas"

  Phase 5 - Assembly:
    - "[ ] Template carregado antes de escrever"
    - "[ ] Zero {{variáveis}} não substituídas"
    - "[ ] Arquivo em squads/{squad_destination}/"
    - "[ ] ≥300 linhas"

  Phase 6 - T.E.S.T.E.:
    - "[ ] 5 testes executados"
    - "[ ] Checklist 20 pontos completado"
    - "[ ] Score ≥14/20 para aprovação"
    - "[ ] squads/{squad_destination}/.clones/{slug}/calibration-report.md gerado"

